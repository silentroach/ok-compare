server {
    server_name kpshelkovo.online;

    root /var/www/kpshelkovo-online;
    index index.html;
    set $html_cache_control public,max-age=60;

    server_tokens off;
    more_clear_headers Server;
    more_set_headers "Strict-Transport-Security: max-age=31536000";
    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "X-Frame-Options: SAMEORIGIN";
    more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    more_set_headers "Content-Security-Policy: default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru https://api-maps.yandex.ru https://yastatic.net; connect-src 'self' https://mc.yandex.ru wss://mc.yandex.ru https://api-maps.yandex.ru https://*.maps.yandex.net https://*.yandex.ru; img-src 'self' data: blob: https://mc.yandex.ru https://*.maps.yandex.net https://*.yandex.ru; style-src 'self' 'unsafe-inline' https://yastatic.net; font-src 'self' data: https://yastatic.net; frame-src 'self' https://yandex.ru; worker-src 'self' blob:; manifest-src 'self'";

    etag on;
    if_modified_since exact;
    open_file_cache max=20000 inactive=120s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/markdown
        text/calendar
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    brotli on;
    brotli_comp_level 5;
    brotli_min_length 1024;
    brotli_types
        text/plain
        text/markdown
        text/calendar
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    location /.well-known/acme-challenge/ {
        allow all;
        try_files $uri =404;
    }

    location ^~ /static/ {
        access_log off;
        log_not_found off;
        gzip_static on;
        brotli_static on;
        add_header Vary Accept-Encoding always;
        add_header Cache-Control public,max-age=31536000,immutable always;
        try_files $uri =404;
    }

    location ^~ /815/compare/static/ {
        access_log off;
        log_not_found off;
        gzip_static on;
        brotli_static on;
        add_header Vary Accept-Encoding always;
        add_header Cache-Control public,max-age=31536000,immutable always;
        try_files $uri =404;
    }

    location ^~ /815/compare/data/ {
        access_log off;
        log_not_found off;
        gzip_static on;
        brotli_static on;
        add_header Vary Accept-Encoding always;
        add_header Cache-Control public,max-age=300,must-revalidate always;
        try_files $uri =404;
    }

    location = / {
        set $md /index.md;
        error_page 418 = @site_markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</llms-full.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /index.html =404;
    }

    location = /news/ {
        set $md /news/index.md;
        error_page 418 = @news_markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "</news/.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</news/llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</news/llms-full.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</news/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /news/index.html =404;
    }

    location ~ "^/news/(?:(?:[0-9]{4}(?:/[0-9]{2}(?:/[^/]+)?)?)|tags(?:/[^/]+)?)?/$" {
        set $md "${uri}index.md";
        set $html "${uri}index.html";
        error_page 418 = @news_markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "<$md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files $html =404;
    }

    location = /status/ {
        set $md /status/index.md;
        error_page 418 = @status_markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "</status/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /status/index.html =404;
    }

    location ~ "^/status/incidents/[0-9]{4}/[0-9]{2}/[^/]+/$" {
        set $md "${uri}index.md";
        set $html "${uri}index.html";
        error_page 418 = @status_markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "<$md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files $html =404;
    }

    location ~ "^/status/[^/]+/$" {
        set $md "${uri}index.md";
        set $html "${uri}index.html";
        error_page 418 = @status_markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "<$md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files $html =404;
    }

