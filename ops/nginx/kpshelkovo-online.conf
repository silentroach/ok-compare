server {
    server_name kpshelkovo.online;

    root /var/www/kpshelkovo-online;
    index index.html;
    set $html_cache_control public,max-age=60,stale-while-revalidate=300;

    server_tokens off;
    more_clear_headers Server;
    more_set_headers "Strict-Transport-Security: max-age=31536000";
    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "X-Frame-Options: SAMEORIGIN";
    more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    more_set_headers "Content-Security-Policy: default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'sha256-BrDhGE1lwa85arfXcrBxSo+n37uVSX5CAROXnIM6Q+g=' 'sha256-Q2BPg90ZMplYY+FSdApNErhpWafg2hcRRbndmvxuL/Q=' 'sha256-BF0290pkb3jxQsE7z00xR8Imp8X34FLC88L0lkMnrGw=' 'sha256-eIXWvAmxkr251LJZkjniEK5LcPF3NkapbJepohwYRIc=' https://mc.yandex.ru https://mc.yandex.com https://api-maps.yandex.ru https://yastatic.net; script-src-attr 'none'; connect-src 'self' https://mc.yandex.ru https://mc.yandex.com wss://mc.yandex.ru wss://mc.yandex.com https://api-maps.yandex.ru https://*.maps.yandex.net https://*.yandex.ru; img-src 'self' data: blob: https://mc.yandex.ru https://mc.yandex.com https://*.maps.yandex.net https://*.yandex.ru; style-src 'self' 'unsafe-inline' https://yastatic.net; font-src 'self' data: https://yastatic.net; frame-src 'self' https://yandex.ru; worker-src 'self' blob:; manifest-src 'self'";

    etag on;
    if_modified_since exact;
    open_file_cache max=20000 inactive=120s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/markdown
        text/calendar
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    brotli on;
    brotli_comp_level 5;
    brotli_min_length 1024;
    brotli_types
        text/plain
        text/markdown
        text/calendar
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    location /.well-known/acme-challenge/ {
        allow all;
        try_files $uri =404;
    }

    location ^~ /static/ {
        access_log off;
        log_not_found off;
        gzip_static on;
        brotli_static on;
        add_header Vary Accept-Encoding always;
        add_header Cache-Control public,max-age=2592000,immutable always;
        try_files $uri =404;
    }

    location ^~ /815/compare/data/ {
        access_log off;
        log_not_found off;
        gzip_static on;
        brotli_static on;
        add_header Vary Accept-Encoding always;
        add_header Cache-Control public,max-age=300,stale-while-revalidate=300 always;
        try_files $uri =404;
    }

    location ~* ^/(?:815/compare/)?(?:android-chrome-(?:192x192|512x512)\.png|apple-touch-icon\.png|favicon(?:-[0-9]+x[0-9]+)?\.(?:ico|png|svg)|icon-(?:192|512)\.svg|mstile-150x150\.png|safari-pinned-tab\.svg)$ {
        access_log off;
        log_not_found off;
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=3600" always;
        try_files $uri =404;
    }

    location = / {
        set $md /index.md;
        error_page 418 = @markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</llms-full.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /index.html =404;
    }

    location = /news/ {
        set $md /news/index.md;
        error_page 418 = @markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "</news/.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</news/llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</news/llms-full.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</news/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /news/index.html =404;
    }

    location ~ "^/news/(?:(?:[0-9]{4}(?:/[0-9]{2}(?:/[^/]+)?)?)|tags(?:/[^/]+)?)?/$" {
        set $md "${uri}index.md";
        set $html "${uri}index.html";
        error_page 418 = @markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "<$md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files $html =404;
    }

    location = /status/ {
        set $md /status/index.md;
        error_page 418 = @markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "</status/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /status/index.html =404;
    }

    location ~ "^/status/incidents/[0-9]{4}/[0-9]{2}/[^/]+/$" {
        set $md "${uri}index.md";
        set $html "${uri}index.html";
        error_page 418 = @markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "<$md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files $html =404;
    }

    location ~ "^/status/[^/]+/$" {
        set $md "${uri}index.md";
        set $html "${uri}index.html";
        error_page 418 = @markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "<$md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files $html =404;
    }

    location ~ "^/(?:people(?:/[^/]+)?|815/regulation(?:/(?:services|assets))?)/$" {
        set $html "${uri}index.html";
        add_header Cache-Control $html_cache_control always;
        try_files $html =404;
    }

    # TODO(2026-08-08): remove temporary /compare/ public page redirects.
    location ~ ^/compare/?$ {
        return 301 https://kpshelkovo.online/815/compare/;
    }

    location ~ ^/compare/rating/?$ {
        return 301 https://kpshelkovo.online/815/compare/rating/;
    }

    location ~ ^/compare/settlements/(arneevo-park|beketovo-park|chulkovo-club|garmoniya|green-forest|green-park|green-river|greenwood|ivushkino|kapitanskaya-buhta|kapitanskaya-dochka|kapitansky-mys|kapitansky-ostrov|lesnoy-peyzazh-2|lucky-place|melikhovo-park|monacovo|nordic|nordic-forest|nordic-hills|nordic-lake|novikovo|olimp-1|olimp-2|olvil|ozeretskoe-lend|panorama-river|river|rozhdestveno|shelkovo|sokolinaya-gora|sosny-village|velikie-ozera|vyazemskie-sady|white-park|yusupovo-village|zaharkino-park)/?$ {
        return 301 https://kpshelkovo.online/815/compare/settlements/$1/;
    }

    location = /815/compare/ {
        set $md /815/compare/index.md;
        error_page 418 = @markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "</815/compare/.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</815/compare/llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</815/compare/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /815/compare/index.html =404;
    }

    location = /815/compare/rating/ {
        set $md /815/compare/rating/index.md;
        error_page 418 = @markdown;
        add_header Cache-Control $html_cache_control always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /815/compare/rating/index.html =404;
    }

    location ~ ^/815/compare/settlements/[^/]+/$ {
        set $md "${uri}index.md";
        set $html "${uri}index.html";
        error_page 418 = @markdown;
        add_header Cache-Control $html_cache_control always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files $html =404;
    }

    location @markdown {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $md =404;
    }

    location ~* ^/(?:news|status|people|815/(?:compare|regulation))/.*\.md$ {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $uri =404;
    }

    location ~* ^/(?:815/compare/)?\.well-known/agent-skills/.+\.md$ {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $uri =404;
    }

    location = /index.md {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control $html_cache_control always;
    }

    location = /index.html {
        add_header Cache-Control $html_cache_control always;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</llms-full.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;
    }

    location = /815/compare/index.html {
        add_header Cache-Control $html_cache_control always;
        add_header Link "</815/compare/.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</815/compare/llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</815/compare/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;
    }

    location = /news/index.html {
        add_header Cache-Control $html_cache_control always;
        add_header Link "</news/.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</news/llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</news/llms-full.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</news/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;
    }

    location = /status/index.html {
        add_header Cache-Control $html_cache_control always;
        add_header Link "</status/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;
    }

    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\"; profile=\"https://www.rfc-editor.org/info/rfc9727\"" always;
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=600" always;
        try_files $uri =404;
    }

    location = /815/compare/.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Link "</815/compare/.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\"; profile=\"https://www.rfc-editor.org/info/rfc9727\"" always;
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=600" always;
        try_files $uri =404;
    }

    location = /news/.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Link "</news/.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\"; profile=\"https://www.rfc-editor.org/info/rfc9727\"" always;
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=600" always;
        try_files $uri =404;
    }

    location ~ ^/(?:status|people|815/regulation)/\.well-known/api-catalog$ {
        default_type application/linkset+json;
        add_header Link "<$uri>; rel=\"api-catalog\"; type=\"application/linkset+json\"; profile=\"https://www.rfc-editor.org/info/rfc9727\"" always;
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=600" always;
        try_files $uri =404;
    }

    location ~ ^/(?:815/compare/)?\.well-known/agent-skills/index\.json$ {
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=600" always;
        try_files $uri =404;
    }

    location ~ ^/(?:llms|llms-full)\.txt$ {
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=600" always;
    }

    location ~ ^/(?:news|status|people|815/(?:compare|regulation))/llms(?:-full)?\.txt$ {
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=600" always;
    }

    location = /robots.txt {
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=600" always;
        try_files $uri =404;
    }

    # RSS/feed — короткий TTL
    location ~ ^/(?:news|status)/feed\.xml$ {
        add_header Cache-Control "public,max-age=300,stale-while-revalidate=300" always;
    }

    # Per-article event calendar downloads
    location ~ "^/news/[0-9]{4}/[0-9]{2}/[^/]+/(?<event_ics_file>[a-z0-9]+(?:-[a-z0-9]+)*\.ics)$" {
        charset utf-8;
        charset_types text/calendar;
        types {
            text/calendar ics;
        }
        default_type text/calendar;
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=600" always;
        add_header Content-Disposition "attachment; filename=\"$event_ics_file\"" always;
        try_files $uri =404;
    }

    # JSON / machine-readable
    location ~ ^/news/(data|\.well-known|llms|openapi|schemas)/ {
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=600" always;
    }

    location ~ ^/815/compare/(?:\.well-known|openapi|schemas)/ {
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=600" always;
    }

    location ~ ^/status/data/ {
        add_header Cache-Control "public,max-age=60,stale-while-revalidate=300" always;
    }

    location ~ ^/(status|people|815/regulation)/(\.well-known|llms|openapi|schemas)/ {
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=600" always;
    }

    location ~ ^/(people|815/regulation)/data/ {
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=600" always;
    }

    # News media assets
    location ~* ^/news/.*\.(jpg|jpeg|png|webp|gif|svg)$ {
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=3600" always;
        access_log off;
        log_not_found off;
    }

    # Source PDFs under stable public URLs
    location ~* ^/815/regulation/original/[^/]+\.pdf$ {
        add_header Cache-Control "public,max-age=3600,stale-while-revalidate=3600" always;
        access_log off;
        log_not_found off;
    }

    # Canonical trailing slash for news articles
    location ~ "^/news/(\d{4})/(\d{2})/([^/]+)$" {
        return 301 /news/$1/$2/$3/;
    }

    location /815/compare/ {
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    listen [::]:443 ssl http2; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kpshelkovo.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kpshelkovo.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen [::]:443 ssl http2;
    listen 443 ssl http2;
    server_name www.kpshelkovo.online;

    ssl_certificate /etc/letsencrypt/live/kpshelkovo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kpshelkovo.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        return 301 https://kpshelkovo.online$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name www.kpshelkovo.online;

    location /.well-known/acme-challenge/ {
        root /var/www/kpshelkovo-online;
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://kpshelkovo.online$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name kpshelkovo.online;

    location /.well-known/acme-challenge/ {
        root /var/www/kpshelkovo-online;
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
