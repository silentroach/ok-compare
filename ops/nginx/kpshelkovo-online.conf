    location = /815/compare/ {
        set $md /815/compare/index.md;
        error_page 418 = @compare_markdown;
        add_header Cache-Control $html_cache_control always;
        add_header Link "</815/compare/.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</815/compare/llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</815/compare/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /815/compare/index.html =404;
    }

    location = /815/compare/rating/ {
        set $md /815/compare/rating/index.md;
        error_page 418 = @compare_markdown;
        add_header Cache-Control $html_cache_control always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /815/compare/rating/index.html =404;
    }

    location ~ ^/815/compare/settlements/[^/]+/$ {
        set $md "${uri}index.md";
        set $html "${uri}index.html";
        error_page 418 = @compare_markdown;
        add_header Cache-Control $html_cache_control always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files $html =404;
    }

    location @site_markdown {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $md =404;
    }

    location @compare_markdown {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $md =404;
    }

    location @news_markdown {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $md =404;
    }

    location @status_markdown {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $md =404;
    }

    location ~* ^/news/.*\.md$ {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $uri =404;
    }

    location ~* ^/status/.*\.md$ {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $uri =404;
    }

    location ~* ^/815/compare/.*\.md$ {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $uri =404;
    }

    location = /index.md {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control $html_cache_control always;
    }

    location = /index.html {
        add_header Cache-Control $html_cache_control always;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</llms-full.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;
    }

    location = /815/compare/index.html {
        add_header Cache-Control $html_cache_control always;
        add_header Link "</815/compare/.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</815/compare/llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</815/compare/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;
    }

    location = /news/index.html {
        add_header Cache-Control $html_cache_control always;
        add_header Link "</news/.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</news/llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</news/llms-full.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</news/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;
    }

    location = /status/index.html {
        add_header Cache-Control $html_cache_control always;
        add_header Link "</status/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;
    }

    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\"; profile=\"https://www.rfc-editor.org/info/rfc9727\"" always;
        try_files $uri =404;
    }

    location = /815/compare/.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Link "</815/compare/.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\"; profile=\"https://www.rfc-editor.org/info/rfc9727\"" always;
        try_files $uri =404;
    }

    location = /news/.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Link "</news/.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\"; profile=\"https://www.rfc-editor.org/info/rfc9727\"" always;
        try_files $uri =404;
    }

    # RSS/feed — короткий TTL
    location ~ ^/news/feed\.xml$ {
        add_header Cache-Control "public,max-age=300,must-revalidate" always;
    }

    # Per-article event calendar downloads
    location ~ "^/news/[0-9]{4}/[0-9]{2}/[^/]+/event\.ics$" {
        charset utf-8;
        charset_types text/calendar;
        types {
            text/calendar ics;
        }
        default_type text/calendar;
        add_header Cache-Control "public,max-age=3600,must-revalidate" always;
        add_header Content-Disposition "attachment; filename=\"event.ics\"" always;
        try_files $uri =404;
    }

    # JSON / machine-readable
    location ~ ^/news/(data|\.well-known|llms|openapi|schemas)/ {
        add_header Cache-Control "public,max-age=3600,must-revalidate" always;
    }

    # News media assets
    location ~* ^/news/.*\.(jpg|jpeg|png|webp|gif|svg)$ {
        expires 7d;
        add_header Cache-Control "public" always;
        access_log off;
        log_not_found off;
    }

    # Canonical trailing slash for news articles
    location ~ "^/news/(\d{4})/(\d{2})/([^/]+)$" {
        return 301 /news/$1/$2/$3/;
    }

    location /815/compare/ {
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    listen [::]:443 ssl http2; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kpshelkovo.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kpshelkovo.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen [::]:443 ssl http2;
    listen 443 ssl http2;
    server_name www.kpshelkovo.online;

    ssl_certificate /etc/letsencrypt/live/kpshelkovo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kpshelkovo.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        return 301 https://kpshelkovo.online$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name www.kpshelkovo.online;

    location /.well-known/acme-challenge/ {
        root /var/www/kpshelkovo-online;
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://kpshelkovo.online$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name kpshelkovo.online;

    location /.well-known/acme-challenge/ {
        root /var/www/kpshelkovo-online;
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
