server {
    server_name kpshelkovo.online;

    root /var/www/kpshelkovo-online;
    index index.html;

    server_tokens off;
    more_clear_headers Server;
    more_set_headers "Strict-Transport-Security: max-age=31536000";
    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "X-Frame-Options: SAMEORIGIN";
    more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    more_set_headers "Content-Security-Policy: default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru https://api-maps.yandex.ru https://yastatic.net; connect-src 'self' https://mc.yandex.ru wss://mc.yandex.ru https://api-maps.yandex.ru https://*.maps.yandex.net https://*.yandex.ru; img-src 'self' data: blob: https://mc.yandex.ru https://*.maps.yandex.net https://*.yandex.ru; style-src 'self' 'unsafe-inline' https://yastatic.net; font-src 'self' data: https://yastatic.net; worker-src 'self' blob:; manifest-src 'self'";

    etag on;
    if_modified_since exact;
    open_file_cache max=20000 inactive=120s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/markdown
        text/calendar
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    brotli on;
    brotli_comp_level 5;
    brotli_min_length 1024;
    brotli_types
        text/plain
        text/markdown
        text/calendar
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    location /.well-known/acme-challenge/ {
        allow all;
        try_files $uri =404;
    }

    location ^~ /static/ {
        access_log off;
        log_not_found off;
        brotli_static on;
        add_header Vary Accept-Encoding always;
        add_header Cache-Control public,max-age=31536000,immutable always;
        try_files $uri =404;
    }

    location ^~ /compare/static/ {
        access_log off;
        log_not_found off;
        brotli_static on;
        add_header Vary Accept-Encoding always;
        add_header Cache-Control public,max-age=31536000,immutable always;
        try_files $uri =404;
    }

    location ^~ /compare/data/ {
        access_log off;
        log_not_found off;
        brotli_static on;
        add_header Vary Accept-Encoding always;
        add_header Cache-Control public,max-age=300,must-revalidate always;
        try_files $uri =404;
    }

    location = / {
        set $md /index.md;
        error_page 418 = @site_markdown;
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</llms-full.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /index.html =404;
    }

    location = /news/ {
        set $md /news/index.md;
        error_page 418 = @news_markdown;
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
        add_header Link "</news/.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</news/llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</news/llms-full.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</news/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /news/index.html =404;
    }

    location ~ "^/news/(?:(?:[0-9]{4}(?:/[0-9]{2}(?:/[^/]+)?)?)|tags(?:/[^/]+)?)?/$" {
        set $md "${uri}index.md";
        set $html "${uri}index.html";
        error_page 418 = @news_markdown;
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
        add_header Link "<$md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files $html =404;
    }

    location = /status/ {
        set $md /status/index.md;
        error_page 418 = @status_markdown;
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
        add_header Link "</status/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /status/index.html =404;
    }

    location ~ "^/status/incidents/[0-9]{4}/[0-9]{2}/[^/]+/$" {
        set $md "${uri}index.md";
        set $html "${uri}index.html";
        error_page 418 = @status_markdown;
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
        add_header Link "<$md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files $html =404;
    }

    location ~ "^/status/[^/]+/$" {
        set $md "${uri}index.md";
        set $html "${uri}index.html";
        error_page 418 = @status_markdown;
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
        add_header Link "<$md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files $html =404;
    }

    location = /compare/ {
        set $md /compare/index.md;
        error_page 418 = @compare_markdown;
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
        add_header Link "</compare/.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</compare/llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</compare/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /compare/index.html =404;
    }

    location = /compare/rating/ {
        set $md /compare/rating/index.md;
        error_page 418 = @compare_markdown;
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /compare/rating/index.html =404;
    }

    location ~ ^/compare/settlements/[^/]+/$ {
        set $md "${uri}index.md";
        set $html "${uri}index.html";
        error_page 418 = @compare_markdown;
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files $html =404;
    }

    location @site_markdown {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $md =404;
    }

    location @compare_markdown {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $md =404;
    }

    location @news_markdown {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $md =404;
    }

    location @status_markdown {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $md =404;
    }

    location ~* ^/news/.*\.md$ {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $uri =404;
    }

    location ~* ^/status/.*\.md$ {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $uri =404;
    }

    location ~* ^/compare/.*\.md$ {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $uri =404;
    }

    location = /index.md {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
    }

    location = /index.html {
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</llms-full.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;
    }

    location = /compare/index.html {
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
        add_header Link "</compare/.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</compare/llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</compare/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;
    }

    location = /news/index.html {
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
        add_header Link "</news/.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</news/llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</news/llms-full.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</news/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;
    }

    location = /status/index.html {
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
        add_header Link "</status/index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;
    }

    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\"; profile=\"https://www.rfc-editor.org/info/rfc9727\"" always;
        try_files $uri =404;
    }

    location = /compare/.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Link "</compare/.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\"; profile=\"https://www.rfc-editor.org/info/rfc9727\"" always;
        try_files $uri =404;
    }

    location = /news/.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Link "</news/.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\"; profile=\"https://www.rfc-editor.org/info/rfc9727\"" always;
        try_files $uri =404;
    }

    # RSS/feed — короткий TTL
    location ~ ^/news/feed\.xml$ {
        add_header Cache-Control "public,max-age=300,must-revalidate" always;
    }

    # Per-article event calendar downloads
    location ~ "^/news/[0-9]{4}/[0-9]{2}/[^/]+/event\.ics$" {
        charset utf-8;
        charset_types text/calendar;
        types {
            text/calendar ics;
        }
        default_type text/calendar;
        add_header Cache-Control "public,max-age=3600,must-revalidate" always;
        add_header Content-Disposition "attachment; filename=\"event.ics\"" always;
        try_files $uri =404;
    }

    # JSON / machine-readable
    location ~ ^/news/(data|\.well-known|llms|openapi|schemas)/ {
        add_header Cache-Control "public,max-age=3600,must-revalidate" always;
    }

    # News media assets
    location ~* ^/news/.*\.(jpg|jpeg|png|webp|gif|svg)$ {
        expires 7d;
        add_header Cache-Control "public" always;
        access_log off;
        log_not_found off;
    }

    # Canonical trailing slash for news articles
    location ~ "^/news/(\d{4})/(\d{2})/([^/]+)$" {
        return 301 /news/$1/$2/$3/;
    }

    location /compare/ {
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    listen [::]:443 ssl http2; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kpshelkovo.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kpshelkovo.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen [::]:443 ssl http2;
    listen 443 ssl http2;
    server_name www.kpshelkovo.online;

    ssl_certificate /etc/letsencrypt/live/kpshelkovo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kpshelkovo.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        return 301 https://kpshelkovo.online$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name www.kpshelkovo.online;

    location /.well-known/acme-challenge/ {
        root /var/www/kpshelkovo-online;
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://kpshelkovo.online$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name kpshelkovo.online;

    location /.well-known/acme-challenge/ {
        root /var/www/kpshelkovo-online;
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
