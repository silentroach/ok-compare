proxy_cache_path /var/cache/nginx/media-kpshelkovo-online
    levels=1:2
    keys_zone=kps_media:10m
    max_size=1g
    inactive=30m
    use_temp_path=off;

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name media.kpshelkovo.online;
    root /var/www/media-kpshelkovo-online;

    ssl_certificate /etc/letsencrypt/live/kpshelkovo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kpshelkovo.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;

    location = /404.html {
        internal;
        try_files /404.html =404;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Content-Security-Policy "default-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; img-src 'self'; font-src 'self'; style-src 'unsafe-inline'" always;
        add_header Cache-Control "public,max-age=60" always;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location ^~ /_media/ {
        try_files $uri =404;

        limit_except GET {
            deny all;
        }

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Content-Security-Policy "default-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
        add_header Cache-Control "public,max-age=31536000,immutable" always;
    }

    location / {
        set $args "";

        limit_except GET {
            deny all;
        }

        proxy_pass https://kps-public.s3.regru.cloud/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host kps-public.s3.regru.cloud;
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";

        proxy_ssl_server_name on;
        proxy_ssl_name kps-public.s3.regru.cloud;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_intercept_errors on;
        error_page 403 404 =404 /404.html;

        proxy_cache kps_media;
        proxy_cache_key "$proxy_host$uri";
        proxy_cache_valid 200 10m;
        proxy_cache_valid 301 302 10m;
        proxy_cache_valid 403 404 1m;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        proxy_ignore_headers X-Accel-Expires Expires Cache-Control Set-Cookie;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        proxy_hide_header Set-Cookie;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        add_header Content-Security-Policy "default-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; sandbox" always;
        add_header Cache-Control "public,max-age=300,stale-while-revalidate=300";
        add_header X-Cache-Status $upstream_cache_status always;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name media.kpshelkovo.online;

    location /.well-known/acme-challenge/ {
        root /var/www/kpshelkovo-online;
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://media.kpshelkovo.online$request_uri;
    }
}
