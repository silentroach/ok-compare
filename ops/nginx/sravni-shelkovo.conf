server {
    server_name xn--80aestmf.xn--b1afpdqb8d.xn--p1ai;

    root /var/www/sravni-shelkovo;
    index index.html;

    server_tokens off;
    more_clear_headers Server;

    etag on;
    if_modified_since exact;
    open_file_cache max=20000 inactive=120s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    brotli on;
    brotli_comp_level 5;
    brotli_min_length 1024;
    brotli_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    location /.well-known/acme-challenge/ {
        allow all;
        try_files $uri =404;
    }

    location ^~ /_astro/ {
        access_log off;
        log_not_found off;
        brotli_static on;
        add_header Vary Accept-Encoding always;
        add_header Cache-Control public,max-age=31536000,immutable always;
        try_files $uri =404;
    }

    location ^~ /data/ {
        access_log off;
        log_not_found off;
        brotli_static on;
        add_header Vary Accept-Encoding always;
        add_header Cache-Control public,max-age=300,must-revalidate always;
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control no-cache always;
    }

    location = /index.html {
        add_header Cache-Control no-cache always;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</for-agents/>; rel=\"service-doc\"" always;
        add_header Link "</llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
    }

    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\"; profile=\"https://www.rfc-editor.org/info/rfc9727\"" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    listen [::]:443 ssl http2 ipv6only=on; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/xn--80aestmf.xn--b1afpdqb8d.xn--p1ai/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/xn--80aestmf.xn--b1afpdqb8d.xn--p1ai/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = xn--80aestmf.xn--b1afpdqb8d.xn--p1ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name xn--80aestmf.xn--b1afpdqb8d.xn--p1ai;
    return 404; # managed by Certbot
}
