server {
    server_name xn--80aestmf.xn--b1afpdqb8d.xn--p1ai;

    server_tokens off;
    charset utf-8;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /.well-known/acme-challenge/ {
        root /var/www/sravni-shelkovo;
        allow all;
        try_files $uri =404;
    }

    # Only old public page URLs redirect; machine-readable and asset URLs 404.
    location = / {
        return 301 https://kpshelkovo.online/815/compare/;
