server {
    server_name xn--80aestmf.xn--b1afpdqb8d.xn--p1ai;

    root /var/www/sravni-shelkovo;
    index index.html;

    server_tokens off;
    charset utf-8;
    more_clear_headers Server;
    more_set_headers "Strict-Transport-Security: max-age=31536000";
    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";

    etag on;
    if_modified_since exact;
    open_file_cache max=20000 inactive=120s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/markdown
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    brotli on;
    brotli_comp_level 5;
    brotli_min_length 1024;
    brotli_types
        text/plain
        text/markdown
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    location /.well-known/acme-challenge/ {
        allow all;
        try_files $uri =404;
    }

    location ^~ /static/ {
        access_log off;
        log_not_found off;
        gzip_static on;
        brotli_static on;
        add_header Vary Accept-Encoding always;
        add_header Cache-Control public,max-age=31536000,immutable always;
        try_files $uri =404;
    }

    # TODO: удалить через месяц (фолбек для кэшированного HTML со старыми ссылками на /_astro/)
    location ^~ /_astro/ {
        alias /var/www/sravni-shelkovo/static/;
        access_log off;
        log_not_found off;
        gzip_static on;
        brotli_static on;
        add_header Vary Accept-Encoding always;
        add_header Cache-Control public,max-age=31536000,immutable always;
        try_files $uri =404;
    }

    location ^~ /data/ {
        access_log off;
        log_not_found off;
        gzip_static on;
        brotli_static on;
        add_header Vary Accept-Encoding always;
        add_header Cache-Control public,max-age=300,must-revalidate always;
        try_files $uri =404;
    }

    location = / {
        set $md /index.md;
        error_page 418 = @markdown;
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</for-agents/>; rel=\"service-doc\"" always;
        add_header Link "</llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /index.html =404;
    }

    location = /rating/ {
        set $md /rating/index.md;
        error_page 418 = @markdown;
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files /rating/index.html =404;
    }

    location ~ ^/settlements/[^/]+/$ {
        set $md "${uri}index.md";
        set $html "${uri}index.html";
        error_page 418 = @markdown;
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;

        if ($http_accept ~* "(^|,)\s*text/markdown(?:[;,]|$)") {
            return 418;
        }

        try_files $html =404;
    }

    location @markdown {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $md =404;
    }

    location ~* \.md$ {
        charset utf-8;
        charset_types text/markdown;
        types {
            text/markdown md;
        }
        default_type text/markdown;
        add_header Vary Accept always;
        add_header Cache-Control no-cache always;
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
    }

    location = /index.html {
        add_header Cache-Control no-cache always;
        add_header Vary Accept always;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;
        add_header Link "</for-agents/>; rel=\"service-doc\"" always;
        add_header Link "</llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;
    }

    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\"; profile=\"https://www.rfc-editor.org/info/rfc9727\"" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    listen [::]:443 ssl http2; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kpshelkovo.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kpshelkovo.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80;
    listen [::]:80;
    server_name xn--80aestmf.xn--b1afpdqb8d.xn--p1ai;

    location /.well-known/acme-challenge/ {
        root /var/www/sravni-shelkovo;
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
