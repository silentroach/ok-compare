# Template for settlement data files
# Copy this file and fill in required fields.
# For optional infrastructure/service fields, use valid enum values or omit the field.

name: Название поселка
short_name: Поселок
slug: settlement-slug
website: https://example.com
# Optional: Telegram channel name (without @)
# telegram: example
management_company:
  title: УК Название
  url: https://example.com
is_baseline: false

location:
  address_text: МО, округ Чехов
  lat: 55.7558
  lng: 37.6173
  map_url: https://yandex.ru/maps/org/example/1234567890 # Optional
  district: Чеховский район

tariff:
  value: 0
  unit: rub_per_sotka # rub_per_sotka | rub_per_lot | rub_fixed
  period: month # month | quarter | year
  # normalized_per_sotka_month is computed automatically.
  # If unit is rub_per_lot or rub_fixed, UI shows ~ and uses 10 sotok per lot.
  note: Комментарий к тарифу

# Optional: settlement lot metrics. Use only confirmed values.
# average_sotka заполнять только когда средняя площадь участка найдена в явном виде
# или посчитана по опубликованным площадям конкретных лотов. Не заполнять ее как
# area_ha * 100 / count. Если average_sotka отсутствует, UI и нормализация тарифа
# сначала пробуют оценку по area_ha и count, и только потом fallback 10 соток.
# lots:
#   count: 150
#   area_ha: 29.6
#   average_sotka: 17.8
#   average_note: Средняя площадь рассчитана по опубликованным площадям лотов

# Optional: only if central water supply is confirmed and unlimited use is already
# included in the settlement tariff.
# water_in_tariff: true

# Optional: set only when the settlement is explicitly mentioned in
# Telegram channel @obmandachniki / "Коттеджное рабство".
# rabstvo: true

# Alternative for multi-part tariff:
# tariff:
#   - value: 5813
#     unit: rub_per_lot
#     period: month
#     note: Комментарий к тарифу
#   - value: 100
#     unit: rub_per_sotka
#     period: month

# Infrastructure - all fields are optional
# Use only valid enum values:
#   roads: asphalt | partial_asphalt | gravel | dirt
#   drainage: closed | open | none
#   video_surveillance: full | checkpoint_only | none
#   underground_electricity: full | partial | none
#   sidewalks, lighting, gas, water, sewage, checkpoints, security, fencing,
#   admin_building, retail_or_services: yes | no | partial
infrastructure: {}

# Common spaces - all fields are optional
# Valid values: yes | no | partial
#   club_infrastructure, playgrounds, sports, pool, fitness_club, restaurant,
#   spa_center, walking_routes, water_access, beach_zones, kids_club,
#   sports_camp, primary_school, bbq_zones
common_spaces: {}

# Service model - all fields are optional
# Valid values: yes | no | partial
service_model: {}

sources:
  - title: Источник данных
    url: https://example.com/source
    type: official # official | community | media | personal
    date_checked: 2026-01-01
    comment: Комментарий
