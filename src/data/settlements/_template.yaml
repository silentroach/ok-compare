# Template for settlement data files
# Copy this file and fill in required fields.
# For optional infrastructure/service fields, use valid enum values or omit the field.

name: Название поселка
short_name: Поселок
slug: settlement-slug
website: https://example.com
management_company:
  title: УК Название
  url: https://example.com
is_baseline: false

location:
  address_text: Московская область, округ
  lat: 55.7558
  lng: 37.6173
  map_url: https://yandex.ru/maps/org/example/1234567890 # Optional
  district: Округ

tariff:
  value: 0
  unit: rub_per_sotka # rub_per_sotka | rub_per_lot | rub_fixed
  period: month # month | quarter | year
  # normalized_per_sotka_month is computed automatically.
  # If unit is rub_per_lot or rub_fixed, UI shows ~ and uses 10 sotok per lot.
  note: Комментарий к тарифу

# Infrastructure - all fields are optional
# Use only valid enum values:
#   roads: asphalt | partial_asphalt | gravel | dirt
#   drainage: closed | open | none
#   video_surveillance: full | checkpoint_only | none
#   underground_electricity: full | partial | none
#   sidewalks, lighting, gas, water, sewage, checkpoints, security, fencing,
#   playgrounds, sports, public_spaces, beach_or_water_access, admin_building,
#   retail_or_services: yes | no | partial
infrastructure: {}

# Service model - all fields are optional
# Valid values: yes | no | partial
service_model: {}

sources:
  - title: Источник данных
    url: https://example.com/source
    type: official # official | community | media | personal
    date_checked: 2026-01-01
    comment: Комментарий
