    comment: По официальному ответу компании тариф 13 000 руб/мес с участка, вода включена в тариф; подтверждены асфальтовые дороги, крытая ливневка, тротуары, освещение, КПП, охрана, закрытая территория, видеонаблюдение, подземная электросеть, административное здание, магазин, ФОК, кальянная, караоке, спортивные площадки, начальная и средняя школа, детский сад; также уточнено, что пляжной зоны и лагеря нет, пруд в 10 минутах.
