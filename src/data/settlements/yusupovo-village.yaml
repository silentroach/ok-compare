    type: official
    date_checked: 2026-04-07
    comment: В канале и описании проекта заявлены пешеходный бульвар, парк и скверы, прогулочные маршруты, доступ к водным зонам, барбекю-зоны, круглосуточная аварийная диспетчерская служба и инфраструктура соседнего ЖК Юсупово Лайф Парк.
