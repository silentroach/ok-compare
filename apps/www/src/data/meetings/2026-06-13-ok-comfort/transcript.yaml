speakers:
  moderator:
    name: Модератор
  ykizilov:
    person: ykizilov
  resident:
    name: Житель
  engineer:
    name: Главный инженер ОК
  finance:
    name: Представитель финансового блока ОК
segments:
  - start: '00:00:00'
    speaker: moderator
    text: |
      Добрый день. Начинаем встречу ОК Комфорт с жителями КП Шелково. Сегодня обсудим сезонные работы, обслуживание, тариф и вопросы по финансовой отчетности.
  - start: '00:00:24'
    speaker: ykizilov
    text: |
      Спасибо, что пришли. Мы готовы пройти по текущим работам, показать, что уже сделано, и отдельно ответить на вопросы по тарифу. Часть цифр требует пояснений, поэтому договорились говорить по блокам, а не одним общим списком.
  - start: '00:01:05'
    speaker: engineer
    text: |
      По сезонным работам сейчас в фокусе дороги, ливневки, покос и освещение. Дороги после зимы осмотрели, мелкие ямы закрываем по мере поступления материалов. По ливневкам есть несколько точек, где нужна прочистка после сильных дождей.
  - start: '00:01:44'
    speaker: resident
    text: |
      Жители спрашивают, почему эти работы не видны заранее в понятном графике. Нам важно понимать, что именно запланировано на месяц и где можно проверить выполнение.
  - start: '00:02:16'
    speaker: ykizilov
    text: |
      График можно сделать более понятным. Предлагаю публиковать короткий перечень работ на неделю и отдельно отмечать, что перенесено из-за погоды или поставок. Это не снимет все вопросы, но даст общий контроль.
  - start: '00:02:58'
    speaker: resident
    text: |
      По тарифу главный вопрос в том, как сумма соотносится с фактическим объемом работ. В регламенте много позиций, но жители не всегда видят, что они выполняются с указанной регулярностью.
  - start: '00:03:41'
    speaker: finance
    text: |
      Финансовую часть мы разделили на обязательные расходы, сезонные работы и резервы. По каждой группе можно показать начисления и фактические траты. Если часть данных нужно раскрывать аккуратнее, мы подготовим отдельное пояснение без персональных данных жителей.
  - start: '00:04:28'
    speaker: resident
    text: |
      Просьба не ограничиваться общей презентацией. Нужны документы или таблицы, которые можно спокойно посмотреть после встречи, потому что на месте сложно сверить цифры.
  - start: '00:05:02'
    speaker: ykizilov
    text: |
      Мы услышали эту просьбу. Часть материалов можно выложить после проверки формата. По спорным строкам соберем вопросы отдельно, чтобы не потерять их в общем обсуждении.
  - start: '00:05:44'
    speaker: engineer
    text: |
      По освещению сейчас проверяем несколько линий, где жители жаловались на нестабильную работу фонарей. Нужны точные адреса или номера участков, чтобы бригада не тратила время на повторный объезд всего поселка.
  - start: '00:06:20'
    speaker: resident
    text: |
      Еще один вопрос по коммуникации. Когда обращение уходит в приложение, жителю часто непонятно, кто отвечает и когда ждать результат. Можно ли сделать статус понятнее?
  - start: '00:07:02'
    speaker: ykizilov
    text: |
      Мы посмотрим, как давать более конкретные ответы по заявкам: принято, назначен исполнитель, требуется материал или выезд, выполнено. Если заявка спорная, будем отдельно пояснять причину задержки.
  - start: '00:07:44'
    speaker: moderator
    text: |
      Зафиксировали три блока для продолжения: недельные планы работ, публикация финансовых пояснений и более понятные статусы по обращениям. Вопросы, которые не успели разобрать, можно передать организаторам встречи.
