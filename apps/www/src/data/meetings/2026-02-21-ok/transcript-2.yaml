      Согласно своду правил, есть СП, есть методические указания Россетей, и применяется коэффициент одновременности. Он считается исходя из количества домов, которые подключены. Вот здесь я, как пример, взял данную табличку: наше количество домов — это то, что ложится в основу проектирования.
