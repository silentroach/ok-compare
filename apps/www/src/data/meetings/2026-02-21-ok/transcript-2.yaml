  - start: '00:31:27'
    speaker: yulia
    text: |
      Еще вопрос по ливневку. Вы планируете закрывать как-то зимой? Несколько собственников уже проваливались, когда заваливает снегом, не видно, уступать надо.
  - start: '00:31:37'
    speaker: ykizilov
    text: |
