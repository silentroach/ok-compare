  - start: '00:37:27'
    speaker: ykizilov
    text: |
      Спасти жизнь, когда кто-то из собственников рубанул себе палец, он оторвался палец. И наши ребята едут ему оказать первую помощь, они спешат. Не просто потому, что им на обед нужно.
  - start: '00:37:38'
    speaker: ykizilov
    text: |
