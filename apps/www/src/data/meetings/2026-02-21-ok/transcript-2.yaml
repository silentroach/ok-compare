      На текущий момент у нас подключено 175 потребителей по Park и по River. Соответственно, выделенная мощность у нас порядка 3 МВт текущая. Еще недавно она была меньше в 2 раза практически. То есть мы постоянно ведем работу по увеличению мощности как по сетям Россетей, так и по нашим сетям.

