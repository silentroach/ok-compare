segments:
  - start: '00:00:00'
    speaker: ykizilov
    text: |
      Господа, очень попрошу, чтобы мы тут до утра не сидели. Единственное, чуть-чуть, пожалуйста, регламента внесу в нашу встречу.
  - start: '00:00:12'
    speaker: aleksey
    text: |
      Мы хотели бы задать вопросы. Виталий сейчас их будет задавать. Мы подготовили список. Юрий с удовольствием на них, наверное, ответит.
  - start: '00:00:20'
    speaker: ykizilov
    text: |
      Я бы просил не вступать в длинную полемику.
  - start: '00:00:24'
    speaker: ykizilov
    text: |
      И с нашей стороны мы постараемся более емко и коротко задавать вопросы. И с вашей стороны, Юрий, тоже очень прошу. Я понимаю, что вы можете подробно хорошо разжевать, но постарайтесь нам разжевать...
  - start: '00:00:39'
    speaker: ykizilov
    text: |
      Ёмко, но коротко. Хорошо, договорились. Спасибо. Перед тем, как начну отвечать на вопросы, публично хочу принести извинения перед Геннадием. Перегну палку, чтобы не изменить эмоции. Они, соответственно, должны здесь быть в багажном смысле. Я готов начинать.
  - start: '00:00:53'
    speaker: ykizilov
    text: |
      Задавайте вопросы.
  - start: '00:00:55'
    speaker: vitaliy
    text: |
      Благодарю, будьте любезны. У нас здесь по блокам разбито и первый вопрос при покупке земельных участков
  - start: '00:01:03'
    speaker: vitaliy
    text: |
      Отдел продаж, на наших сайтах также размещен список объектов инфраструктуры, которые мы говорим, что они не в земле. Вот у вас есть этот список?
  - start: '00:01:14'
    speaker: ykizilov
    text: |
      Конечно.
  - start: '00:01:16'
    speaker: vitaliy
    text: |
      А вы можете... Показать этот список? Можете ли вы расписать для жителей сроки реализации объекта? Вот такой объект будет. Тогда готов. Отвечаю.
  - start: '00:01:30'
    speaker: ykizilov
    text: |
      Я этот список составлял, на основании этого списка информация была представлена на сайте. Что я не смогу точно сделать в рамках текущего календарного года, есть два момента.
  - start: '00:01:40'
    speaker: ykizilov
    text: |
      Первое. Я не смогу в рамках текущего календарного года асфальтировать все дороги. Это в сто процентов. В мае-июне месяце будет понятен, соответственно, объем асфальтирования. Предварительно это все будет с вами, собственниками, проговорено. Но там принцип будет какой?
  - start: '00:01:54'
    speaker: ykizilov
    text: |
      Там, где больше построенных домов, там мы будем в первую очередь асфальтировать. Второй момент, который находится в сложности сейчас проработки, это два озера большие на въезде. Мы проезжаем дамбу и с левой стороны метров, наверное, сто пятьдесят нужно пройти, там два больших озера. К сожалению, столкнулись с сопротивлением со стороны местных семёновских, которые рогом просто встают и не дают нам возможности навести там порядок. Это решаемый вопрос, но, к сожалению, там как это все работает? Они жалуются в местную администрацию, а местная администрация, зарабатывая себе рейтинг, в первую очередь должна выдерживать интересы жителей.
  - start: '00:02:33'
    speaker: ykizilov
    text: |
      Якобы обижены. Хотя мы, наоборот, хотим сделать там красоту, в первую очередь, для всех, соответственно, жителей. Почему не взяли в аренду эти озера? Ну, что у нас впереди. Специально сделали так, что оформили договор аренды.
  - start: '00:02:48'
    speaker: ykizilov
    text: |
      До момента, когда мы туда зашли. Но этот вопрос решаем. Поэтому с ответственностью заявляю, я не смогу физически
  - start: '00:02:57'
    speaker: ykizilov
    text: |
      Заасфальтировать все дороги в этом году. И вряд ли у меня получится решить в рамках текущего календарного года, поскольку чем ближе выборы, они там каждую осень проходят, тем сложнее власти идут на какой-то контакт с бизнесом, потому что зарабатывают себе баллы.
  - start: '00:03:11'
    speaker: ykizilov
    text: |
      Те объекты инфраструктуры, часть я показал, дамбу мы сделаем осенью. Соответственно, все остальные парковые территории, детские спортивные площадки.
  - start: '00:03:22'
    speaker: ykizilov
    text: |
      С точки зрения денег, это очень маленькие расходы по сравнению с той строительной активностью, которая, наверное, уже проведена. Если не будет эскалации конфликта, не между нами своим, а в мировом масштабе. И если я сейчас не буду все свое время тратить на суды,
  - start: '00:03:41'
    speaker: ykizilov
    text: |
      Теперь уже с вами имеется в виду, это позволит мне данный поселок завершить полностью в рамках текущего календарного года.
  - start: '00:03:48'
    speaker: ykizilov
    text: |
      Документально какой-то документ можно ли будет в ближайшее время увидеть со сроками запланированные на может предложить свой вариант процессе
  - start: '00:04:03'
    speaker: ykizilov
    text: |
      Предлагаем тогда объекты инфраструктуры скиньте нам, пожалуйста. Мы подготовим мастер-план. Геннадий, спасибо. И что еще точно в этом году я не смогу сделать физически?
  - start: '00:04:13'
    speaker: ykizilov
    text: |
      Мы начнем по-любому это строить, но не закончим. Это большие деньги, порядка, наверное, сто-сто двадцать миллионов рублей. Это строительство административного здания, где мы как раз-таки коммерческие объекты и откроем. Это тоже очень сильно.
  - start: '00:04:30'
    speaker: yulia
    text: |
      А на дамбу, там же разрешение, вот проект мы видели.
  - start: '00:04:36'
    speaker: ykizilov
    text: |
      Да, у нас все это есть. Все получено. Да, вот вы попросили не уходить в дебри. Я тезисно пару секунд. Сложность была еще в чем?
  - start: '00:04:45'
    speaker: ykizilov
    text: |
      Мы выступили с инициативой, чтобы провести реконструкцию этой дамбы за наш счет, в администрацию имеется в виду. Они говорят, да давайте, без проблем. Но местные, опять же, семёновские ребята, соответственно, встали в позу. Нет, мы не хотим. Почему? Почему вы не хотите? Блин, потому что через нас будут ездить огромное количество уважаемых собственников Шелково.
  - start: '00:05:04'
    speaker: unknown
    text: |
      Мы и так ездим.
  - start: '00:05:06'
    speaker: ykizilov
    text: |
      Да, там по-другому маршрут. Дальше мы говорим, хорошо, пофиг. Тогда мы начали проектировать мост отдельный. Не в том месте, где дамба, а правее. Это стоило кратно больше. Мы были к этому готовы. Потом все-таки удалось убедить администрацию о том, что мы же за свои деньги создаем инфраструктурный проект. Убедите вот этих местных, которые просто нам вредят по природе.
  - start: '00:05:29'
    speaker: ykizilov
    text: |
      Убеди. У нас проект разработан, все закуплено, осталось только... И подписан, согласован с всеми органами. Ответ мы получили. Извините, мы по-любому на сайте выложим перечень строительной активности, которую мы запланируем на этот год.
  - start: '00:05:46'
    speaker: ykizilov
    text: |
      Но опять же поставьте там свою подпись я не могу гарантировать о том что мы завтрашнего дня на чем не начнем воевать с европой и все это крикнется к чертям с точки зрения там буквально поставить звездочку
  - start: '00:05:58'
    speaker: ykizilov
    text: |
      И второй вариант. Я не могу гарантировать, что завтра я неделями не буду находиться в судах, соответственно, отбиваясь от ваших атак на мою компанию.
  - start: '00:06:07'
    speaker: ykizilov
    text: |
      Мы сейчас придумаем, как сделать так, чтобы у вас не было атак и судов. Я думаю, в конце всех наших вопросов мы получим ответы и сможем какой-то...
  - start: '00:06:20'
    speaker: ykizilov
    text: |
      Компромиссное решение предложить от себя вы от себя и возьмем как бы
  - start: '00:06:27'
    speaker: vitaliy
    text: |
      Вот список инфраструктуры, который на сайте я наведу. У меня вот представляется, пойти, если с самого начала поворота Семёновского на КПП основной, который к дамбе, вот первый момент, это вот эта дорога.
  - start: '00:06:40'
    speaker: vitaliy
    text: |
      Потом дамба, потом административное здание, потом спортивные площадки и дальше большой список, то что размещено на сайте.
  - start: '00:06:50'
    speaker: vitaliy
    text: |
      Вот я правильно услышал, что мы можем составить этот список и в компании сейчас нет, так сказать, вот этой дорожной карты, когда будет реализовано, но мы можем его составить.
  - start: '00:07:02'
    speaker: ykizilov
    text: |
      Почему вы не считаете, что нет? Конечно, это все осмечено в формате уже рабочего готового списка задач для строительного департамента. Это все уже стоит.
  - start: '00:07:12'
    speaker: ykizilov
    text: |
      Осталось дождаться только двух факторов. Это окончание зимнего сезона, но нельзя сейчас заниматься стройкой.
  - start: '00:07:17'
    speaker: yulia
    text: |
      К сожалению, у нас в стране... Но вы говорили о том, что нам раньше в чате писали, что как раз строительство легче зимой дам бы делать почему-то.
  - start: '00:07:27'
    speaker: ykizilov
    text: |
      Меньше грязь, но есть другой момент с технической точки зрения там нужно поймать природный момент следующий дамба будет сделана
  - start: '00:07:37'
    speaker: ykizilov
    text: |
      Я сейчас простым языком объясню. Справа и слева стороны большие бетонные заграждения. Прямо по центру вот эти квадратики, которые я вам на фотографии показывал. И все это будет забиваться глиной.
  - start: '00:07:49'
    speaker: ykizilov
    text: |
      А сверху уже щебёночная смесь, песочная и сверху асфальт. Так вот этот момент глины, её нужно было укладывать в тот момент, когда ещё не наступил сильный мороз.
  - start: '00:08:01'
    speaker: ykizilov
    text: |
      В противном случае при сильных морозах и обильных снегопадах она будет не работать, это всё развалится. В техничку сейчас не будем погружаться, как это делается.
  - start: '00:08:12'
    speaker: vitaliy
    text: |
      Вот список инфраструктуры, он с вашей стороны тот, который присутствует на сайте или вы как-то его изменили, укоротили, увеличили?
  - start: '00:08:20'
    speaker: ykizilov
    text: |
      Техническим языком описан, соответственно, просто люди гражданские, которые далеки от стройки, не все пункты там поймут.
  - start: '00:08:28'
    speaker: vitaliy
    text: |
      Я имею в виду, что на сайте или в рекламных материалах есть список «Дорожка в лес», «Вертолетная площадка», «Парковка», «Административное здание», «Ресторан». Из этого списка... Вот это. Понимаю, понимаю.
  - start: '00:08:43'
    speaker: vitaliy
    text: |
      Вы планируете все это реализовать или вы этот список изменили?
  - start: '00:08:47'
    speaker: ykizilov
    text: |
      Нет, мы не корректировали этот список совершенно и в этом нет задачи никакой. Что точно не смогу сделать в этом году, это построить асфальт везде.
  - start: '00:08:54'
    speaker: ykizilov
    text: |
      Завершить строительство административного здания не смогу. И решить вопрос с двумя природными озерами, которые находятся за кадастровыми границами проекта. Все остальное у меня есть силы все это сделать в рамках текущего календарного года.
  - start: '00:09:07'
    speaker: ykizilov
    text: |
      Поскольку все денежные средства, которые предполагались на этот поселок с точки зрения строительства инженерной инфраструктуры, они уже инвестированы и все это построено.
  - start: '00:09:16'
    speaker: yulia
    text: |
      Юрий, а вас не затруднит скинуть в инициативной группе разрешение насчет дамбы, что она получена? То есть мы не будем, наверное, выкладывать никуда, просто чтобы убедиться, что...
  - start: '00:09:26'
    speaker: ykizilov
    text: |
      Давайте скину документацию проекта. Вряд ли что-то поймете в этом, но хоть посмотрим.
  - start: '00:09:33'
    speaker: yulia
    text: |
      Главное разрешение на то, что оно получено от Ступинской администрации.
  - start: '00:09:39'
    speaker: vitaliy
    text: |
      Спасибо. У меня следующий вопрос. Бюджеты и источники финансирования по каждому объекту. Вы уже немного сказали об этом. Деньги на это есть?
  - start: '00:09:52'
    speaker: yulia
    text: |
      Или нас это не касается, вы сделаете в любом случае?
  - start: '00:09:55'
    speaker: ykizilov
    text: |
      Смотрите, вас это не касается. Мы в любом случае этот вопрос замыкаем целиком и полностью на себе. И никогда в жизни мы не обратимся к нашим уважаемым собственникам на предмет того, чтобы люди дополнительно скинулись на что-то другое.
  - start: '00:10:07'
    speaker: ykizilov
    text: |
      Что мы вовремя не сделали, потому что произошло то, что произошло. Все денежные средства – это наши денежные средства, которые мы сами зарабатываем, и вы никакого отношения к дополнительному финансированию никогда иметь не будете. У меня есть там другая идея, она немножко в этой же стези, условно, но внедрить в поселках некую модель краудфандинга. К примеру, банальный пример. Вы хотите...
  - start: '00:10:35'
    speaker: ykizilov
    text: |
      Сейчас банальные примеры приведу. Сделать батутный городок, где я наберу на себя организацию и частично финансирование как обслуживающей компании. Мы на сайте публично это все размещаем с точки зрения того, что каждый собственник, который примет желание в этом, скинется там условно по тысячу рублей, по тысячу рублей.
  - start: '00:10:53'
    speaker: ykizilov
    text: |
      Таким образом мы формируем бюджет, берем на себя организацию, все это должно быть прозрачно, и монтаж. Но это не относится к инфраструктуре, это просто как идея.
  - start: '00:11:02'
    speaker: vitaliy
    text: |
      Я бы даже поучаствовал. Можно еще раз, давайте проговорим шаги, какие нам нужно сделать, чтобы получить список сроки реализации.
  - start: '00:11:10'
    speaker: ykizilov
    text: |
      Да, например, Лиана парк такого-то числа будет, баскетбольная площадка такого-то числа.
  - start: '00:11:15'
    speaker: ykizilov
    text: |
      Я пишу себе эту задачу просто для того, чтобы это публично было представлено на сайте, соответственно, с обозначением сроков но, опять же, давайте банальный пример приведу
  - start: '00:11:30'
    speaker: ykizilov
    text: |
      Он, к сожалению, негативный, но он как есть. Произошел теракт в Крокусе. И после этого момента все строители, все компании, которые так или иначе связаны с персоналом из южных республик, начали испытывать дичайший дефицит кадров, потому что просто страну не пускают толком. А вот эти лианы парки, да блин, эти ребята как раз таки эти лианы парки строят. И я не могу предугадать о том, что у нас в стране вот такого горя, к сожалению, дай бог, никогда больше не произойдёт.
  - start: '00:12:06'
    speaker: ykizilov
    text: |
      Почему я это всё объясняю? Поскольку есть планы, а есть определённого рода события, которые происходят. Короче, резюме. План по строительной активности я выложу на сайте по проекту Шелково.
  - start: '00:12:22'
    speaker: yulia
    text: |
      Просто периодически посматривать на сайте.
  - start: '00:12:24'
    speaker: ykizilov
    text: |
      Нам надо до какого числа это будет? Строительный сезон. До какого вы выложите информацию? Рассказываю. Смотрите, я сейчас ничем Вообще ничем в компании не занимаюсь, кроме как работы с уважаемыми собственниками. Вот вообще ничем. Вам нужна помощь.
  - start: '00:12:46'
    speaker: ykizilov
    text: |
      Вы помогаете мне тем, что сейчас вы не ругаетесь, а спокойно общаетесь. Вот это и есть помощь. Хотите ещё чем-то поможем? Нет, не нужно, спасибо. Больше не надо. Вся вот эта шумиха, она уляжется в течение месяца. Можно сэкономить, можно просто вертолетную площадку сделать и ездить друг к другу в гости. По всему Шелково.
  - start: '00:13:07'
    speaker: yulia
    text: |
      В течение месяца вы сможете выложить?
  - start: '00:13:11'
    speaker: ykizilov
    text: |
      Нет, в течение месяца этот кипиш, который сейчас происходит, он ляжется. И я смогу снова заниматься делами компании, помимо обслуживающей компании.
  - start: '00:13:22'
    speaker: ykizilov
    text: |
