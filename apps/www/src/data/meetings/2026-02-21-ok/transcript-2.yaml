      Есть возможность все это быстро решить в моменте, но это чревато уголовным кодексом. Есть люди, которые... Недоговороспособность. Я не могу гарантировать какой-то срок, когда я поговорю с местными настолько, что они перестанут стучать. Ну невозможно. Опять же, мой посыл к Алексею. У меня какая вообще суть?
  - start: '00:27:21'
    speaker: ykizilov
    text: |
      Я сам больше, чем вы, больше, чем вы заинтересован в том, чтобы быстрее это все достроить и навести марафет. Очень сильно зависит темпы продаж земельных участков, которые мне проданы, и очень сильно зависит стоимость продаж. Чем быстрее я наведу красоту, тем быстрее я продам и продам задором.
  - start: '00:27:35'
    speaker: ykizilov
    text: |
      Я больше заинтересован во всем этом, чем вы. Там еще куча свободных участков. И мне нужно как можно быстрее все это делать.
