  - start: '00:31:07'
    speaker: ykizilov
    text: |
      Какие-то колодцы планируются? Переносные, переливные, да, с отводом уже либо в лес, через участки. И в этом году что-то из этого начнется реализовывать? Обязательно.
  - start: '00:31:16'
    speaker: ykizilov
    text: |
