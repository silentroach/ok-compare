  - start: '00:27:45'
    speaker: ykizilov
    text: |
      Нет. По цифрам нет. Нет, половины еще нет. По сборам.
  - start: '00:27:50'
    speaker: yulia
    text: |
      Поехали.
  - start: '00:27:52'
    speaker: aleksey
    text: |
