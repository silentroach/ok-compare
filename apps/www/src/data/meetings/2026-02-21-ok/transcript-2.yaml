    speaker: ykizilov
    text: |
      Да, взяли опять стуканулы.
  - start: '00:28:59'
    speaker: ekaterina
    text: |
      Сами же на себя жизнь, да?
  - start: '00:29:03'
    speaker: ykizilov
    text: |
      Мы действительно начали подготовительную работу по работе техники в русле реки. Соответственно, в этом месте, в этом месте, еще вот здесь будет грязная территория. Вот тот изгиб, где вот эти острова намыты, здесь-то тоже по логике надо, вот на изгибе, вот где стрелка выше была. Понимаю. Отвечаю на вопрос. Мы начали эту работу в прошлом году, не успели физически. Из-за стукачества и из-за финансового состава.
  - start: '00:29:33'
    speaker: yulia
    text: |
