segments:
  - start: '00:00:00'
    speaker: aleksey
    text: |
      Давайте предварительное слово я скажу. Мы хотели бы... Это микрофон, чтобы жители могли услышать ваши ответы. Мы хотим задать вам вопросы все вместе. Как удобно, вообще трогайте, как хотите. Ммм...

      Мы не хотим спорить, мы не хотим доносить какую-то утвержденную позицию. Мы в первую очередь пришли, собрали вопросы от жителей поселка и хотим их задать, вот это вот первостепенно.
  - start: '00:00:51'
    speaker: ykizilov
    text: |
      Если честно, я удивлён.
  - start: '00:00:54'
    speaker: aleksey
    text: |
      Почему?
  - start: '00:00:55'
    speaker: ykizilov
    text: |
      Потому что я ожидал здесь увидеть как минимум 25 человек, которые между собой разделены, в моём представлении, на 3 категории людей:

      - Первая категория пришла со мной поругаться.
      - Вторая категория, судя по личным угрозам, которые я получаю в телеге, морду набить.
      - Третья категория пришла по-взрослому, как взрослые образованные люди поговорить.

      Поэтому я удивлен.
  - start: '00:01:20'
    speaker: gennadiy
    text: |
      Вот сейчас вот в контексте та категория, которую вы сейчас озвучили, они вот как бы...
  - start: '00:01:24'
    speaker: aleksey
    text: |
      Мы все трое тут. Да не, не, все трое тут на самом деле, все нормально.
  - start: '00:01:32'
    speaker: gennadiy
    text: |
      Нам действительно по факту нужны просто ответы сейчас на те вопросы, которые подготовили. Это действительно топ, мы даже составили рейтинг топовых вопросов в вашем видео.
  - start: '00:01:42'
    speaker: aleksey
    text: |
      И если вы не против, мы знаем, что вы тоже подготовили свою презентацию, но мы бы хотели первостепенно пойти по нашему списку. Наверняка в наших вопросах как раз будут слайды, которые будут отвечать...
  - start: '00:01:55'
    speaker: ykizilov
    text: |
      Я прекрасно понимаю, что вы видели презентацию, которую я скидывал в прошлый раз. Поэтому с этим не буду тратить ваше время, в этом нет никакого смысла.

      Видел, безусловно, список вопросов, но, если на него посмотреть честно, он больше похож на протокол допросов. Мы с вами находимся в помещении ресторана, а не в холодных кабинетах того или иного министерства. И на ваших плечах не кители с погонами, соответственно, вы обычные люди, такие же, как и я. Безусловно, мы пройдемся по всем этим вопросам, которые вы обозначили, и целью встречи сегодняшней я как раз-таки вижу исключительно открытый диалог, чтобы вы наконец-то увидели, что я не какой-то Карабас-Барабас.

      Слайды для вас, для шелковцев. Они, безусловно, есть, но повторяться я не буду, чтобы сэкономить ваше время.
  - start: '00:02:55'
    speaker: ykizilov
    text: |
      Про договор оферты мы забыли. Все, нет никакого договора. Я объективно, вообще сама логика этого слова появилась только потому, что нам сейчас придется парализовать работу офисных сотрудников компании. Просто ещё для того, чтобы с каждым отдельно подписать договор. Чтобы в этом была суть всего этого.
  - start: '00:03:13'
    speaker: ykizilov
    text: |
      Жаль, что Игорь не пришел, Калашников.
  - start: '00:03:21'
    speaker: yulia
    text: |
      Ну они не смогли изначально. Собирались, сразу сказали.
  - start: '00:03:32'
    speaker: ykizilov
    text: |
      Про договор оферты. Забыли, нет никакого договора с этим. Что хочется рассказать. Соответственно, информация по поступлению на расчетные счета нашей компании, она в публичном пространстве. Но далеко не все люди понимают, как это всё работает.

      Начну: с 2020 года до начала 2025 года ситуация была такая. У нас есть 2 юридических лица: ООО «Комфорт» и ООО «Комфорт Сервис». Как мы работали раньше? Мы перешли на новую модель работы только в начале 2025 года. Те денежные средства, которые поступают от вас, уважаемые собственники, в качестве ежемесячных платежей, они поступают на расчетный счет ООО «Комфорт». И до начала 2025 года на этот же расчетный счет поступали денежные средства посредством продажи наших платных услуг (когда мы продаем въезды, ограждения, подключение коммуникаций), деньги все падали на расчетный счет.

      Люди этого не знают (но и не обязаны этого знать), но мнение ошибочно сформировалось такое, что у нас куча денег, мы на них сидим и вас кошмарим. Но это те денежные средства, которые пришли совершенно по другой услуге. Я не могу взять у человека деньги для того, чтобы построить забор, а на эти деньги организовать работу по уборке зимней, платить за работу: это совершенно разные направления.

      Мы, если я не ошибаюсь, в апреле-мае публикуются в публичном пространстве данные по доходам/расходам юридических лиц. Вы это все увидите своими глазами. Ну и также вы должны прекрасно понимать, что часть расходов, которые там есть, которые в этом публикуются, она совершенно не полная. По определенному роду причин. Надеюсь, вы понимаете по каким. Поэтому нет такой ситуации, когда мы супер прибыльны, и я вот занимаюсь вот такой ерундой, как сейчас, пытаясь у вас еще собрать кучу денег для того, чтобы свое качество жизни улучшить и свозить себя на Мальдивы, как меня некоторые жители троллят.
  - start: '00:05:36'
    speaker: ykizilov
    text: |
      Дальше: почему я не в состоянии ежемесячно перед вами отчитываться? Забудем вообще то, что ООО-шка не отчитывается перед физиками. Вот просто в сторону, не в этом суть. Я жалею то, что я это не организовал. Потому что если бы вы видели на протяжении последних 3 лет реальное финансовое положение, мы бы тоже сейчас тут не сидели и не тратили время.

      Но почему я не делаю физически? У меня 1 бухгалтер в Комфорте. Один. И 17 коттеджных поселков. И для того, чтобы она готовила 17 разных отчетов по каждому коттеджному поселку, на это нужно тратить месяц. Физически много, за день человек это все не тянет. А для того, чтобы взять еще 2-3 дополнительных специалистов, у меня нет на это финансовых возможностей. Чтобы расширить штат финансистов, чтобы вам давать отчетность. Вот в какой, условно, кабале я нахожусь.
  - start: '00:06:27'
    speaker: ykizilov
    text: |
      Дальше. Каких бы классных, дорогих, профессиональных, опытных юристов вы бы не привлекли, чтобы представлять ваши интересы в судебной борьбе со мной - ну ни один суд не сможет обязать меня работать себе в убыток. Ни один. Поэтому нам с вами нужно договариваться.
  - start: '00:06:56'
    speaker: gennadiy
    text: |
      Ну это вы сами только решили, что вы так работаете. Мы вообще с другими вопросами пошли. Может быть, вернемся к нашему списку?
  - start: '00:07:06'
    speaker: ykizilov
    text: |
      Да, мы с удовольствием. Они просто между собой связаны.
  - start: '00:08:31'
    speaker: ykizilov
    text: |
      Смотрите, как выглядит ситуация объективно. Сейчас языком таких простых цифр. Для того, чтобы построить коттеджный поселок, нужен миллиард. Условная цифра. Миллиард. Так вот, 90% денежных средств, они находятся под землёй, вы просто их не видите. И не должны видеть. Это инженерные сети, газ, электричество, вода и дороги. Вот очень всё это дорого стоит. Ваши коттеджные поселки, 4 поселка Шелково, они все имеют. Да, есть проблемы с водой, есть сбои, есть проблемы с электричеством, есть сбои. Но все это, блин, у вас уже есть. И у вас позиция какая, если я правильно понимаю контекст, о том, что вы меня обвиняете в том, что вы брошены, соответственно, вы оставлены, и еще в этом контексте я понимаю, куда идут платежи. Но, объективно, для того, чтобы данные поселки были вылизаны с точки зрения расходов, мне нужно, реально, 10% оставшихся денежных средств. 90% мы уже потратили и вложили в этот коттеджный поселок. Просто это все под землей, и вы все этого не ощущаете. Потому что вы не погружаетесь в эту тему и не должны погружаться.
  - start: '00:09:43'
    speaker: ykizilov
    text: |
      Дальше. Дамба через реку Лопасню. Проект уже разработан. Проект уже готов. Даже визуализация есть. Более того, глазками поймайте, пожалуйста, эту тему: видите, вот тут такие бетонные штуки. _[Показывает кадр на экране]_ Мы их уже закупили, они у нас на нашей промплощадке уже есть.

      Почему мы не успели это сделать, как планировали действительно еще в рамках 2025 года? Немножко нам не хватило, чтобы саккумулировать необходимый бюджет. Немного. Но самая дорогая часть — это вот такие вот индивидуально подготовленные плиты. Это нельзя в магазине купить. Это разрабатывается, проектируется, заказывается и очень долго все это производится. Мы уже купили, конечно, они на нашей промплощадке стоят. Да, я скину вам эти слайды. Сейчас можно сразу фиксировать.
  - start: '00:10:49'
    speaker: vitaliy
    text: |
      Классные фотографии.
  - start: '00:10:50'
    speaker: aleksey
    text: |
      Классные фотографии. Хотим форсить это.
  - start: '00:10:54'
    speaker: ykizilov
    text: |
      Да, я сделал вывод, что с внутренним пиаром у нас большая беда. И у вас складывается ощущение, что мы злодеи, а мальчики негодяи.
  - start: '00:11:03'
    speaker: aleksey
    text: |
      Нет у нас такого ощущения. Вы видите, вам кто-то донес эту информацию не совсем корректно. Пока вы так сами себя ругаете. Ничего вообще плохого не сказали.
  - start: '00:11:15'
    speaker: ykizilov
    text: |
      Давайте дальше. Касательно того, что на самом деле Шелково, все 4 поселка, они на 90% готовы с точки зрения финансовых затрат. Самое главное, что там есть электричество, газ, вода и дороги. Не вся покрыта асфальтом.

      Ну вот, давайте про тему асфальта поговорим. Одно дело, если бы мы вообще ничего не делали с этим асфальтом. Ну блин, это же не так. Вот на этом слайде черным цветом обозначен тот сектор дороги, который мы заасфальтировали в 2024 году. Фиолетовым цветом обозначен тот сектор дороги, который мы заасфальтировали в 2025 году. А почему мы сразу все не заасфальтировали? Посмотрите, пожалуйста, на вот этот слайд. Остаток общей площади асфальтирования всех дорог Шелкова составляет 126 000 м².

      Стоимость асфальта в промежутке с 2016 по 2021 год, она ежегодно была примерно на одном уровне. 700-800 ₽ за м². Это информация, которую вы можете проверить без проблем. А потом что произошло? Соответственно, всё это начало дико расти в цене. Вы когда приходите в магазин покупать себе молоко...
  - start: '00:12:30'
    speaker: gennadiy
    text: |
      Вы уточните, когда стало расти в цене?
  - start: '00:12:32'
    speaker: ykizilov
    text: |
      С 2022 года. И вот сухие цифры, как смотрится счет сегодня. Нам необходимо заасфальтировать 126 000 м². Мы часть работ заасфальтировали в прошлом году: то, что фиолетовым цветом, а чёрным цветом то, что заасфальтировали в 2024 году. Так вот, экономика какая? Раньше всё это стоило 800 ₽ за м². И вот этот объём мы пересчитываем на 800 ₽ и выходим на эту сумму, на 100 млн ₽.

      В 2025 году стоимость уже не 800, а 1 700 ₽. И вот какая сумма нам нужна сейчас для того, чтобы асфальтировать до конца.

      Сейчас нам асфальтобетонные заводы не дают информацию по стоимости. Но это нормально. Они зимой не понимают, сколько это все будет стоить, как это все будет работать с учетом новой налоговой ставки. И мы будем в этом плане работать таким образом: наступит строительный сезон, мы совместно проедем по поселку и поймем, какие сектора нужно в первую очередь асфальтировать, где больше всего людей живёт. Поймем, сколько это стоит по ценам 2026 года. И только тогда будем выводить картину: сколько мы можем в этом году построить. Ну вот, единственная причина, почему мы тормозим со сроками строительства. Просто потому, что все дико подорожало.
  - start: '00:13:50'
    speaker: yulia
    text: |
      А почему не были сделаны, сейчас секундочку, почему не было асфальтировано в период, скажем, с 2023 по 2025 год? Потому что в договорах были сроки асфальтирования всего дорожного полотна до 2024 года.
  - start: '00:14:04'
    speaker: ykizilov
    text: |
      Спасибо за вопрос. Спасибо за вопрос, и ответ такой. Если бы мы весь коттеджный поселок продали бы в перспективе ближайшего полутора-двух лет, мы бы в короткий промежуток времени саккумулировали необходимый бюджет на то, чтобы его вылизать и до конца построить. Но когда вся эта канитель началась, продажи упали, а стоимость строительных работ и услуг очень сильно выросла. И мы где-то между оказались. У нас недостаточно денег, потому что продажи сильно упали. И очень сильно выросла стоимость строительства.

      Вот в какой ситуации мы находимся. Но опять же, если бы мы просто бы забили болт и ничего бы не делали, ничего бы не строили, у вас были бы все права считать меня злодеем и негодяем. Но мы из последних сил, соответственно, потихонечку на всё это делаем. Мы ни в коем случае вас не заставляем и не возражаем.
  - start: '00:14:53'
    speaker: yulia
    text: |
      Создаётся впечатление, что именно так. Если возвращаться к вопросу насчет дамбы. Вы сказали, что закуплены материалы. Когда будет строительство дамбы?
  - start: '00:15:03'
    speaker: ykizilov
    text: |
      Логика, которой я руководствуюсь, она такова. Весной, как только снег сойдет, если мы перекроем дамбу, там сроки строительства примерно 1,5 месяца. То есть на 1,5 месяца мы должны будем закрыть здесь въезд. Я не хочу это делать в начале весны, поскольку активно будут строить. Те, кто уже достроились, их это не касается.

      Отвечаю, когда мы ее построим. Так вот, вариант первый, который мне не нравится. Это начало строительного сезона, и как только грунт просохнет, это ориентировочно, потому что снега много, и скорее всего это конец мая - начало июня месяца. Это значит, что мы до середины лета дамбу перекроем. И мы создадим огромное количество дискомфорта тем людям, которые находятся в состоянии строительства. Потому что гнать строительную технику по короткому маршруту и по длинному маршруту через Горки, где узкая дорога, блин, это неудобно. Там тупо 2 фуры не разъедутся.

      Поэтому логика какая? И чем я руководствуюсь? У нас все закуплено. У нас все это лежит на складах. Мы будем делать эту дамбу в конце лета, начале осени. И до середины ноября дамба уже будет введена в эксплуатацию.
  - start: '00:16:20'
    speaker: aleksey
    text: |
      Как-то документально это можно будет увидеть?
  - start: '00:16:24'
    speaker: ykizilov
    text: |
      У нас, в принципе, логика такая, что все 4 коттеджных поселка Шелково я закончу в этом году. Самое главное, что там есть газ, электричество и вода. Это вот 90% дохода. Вылизывание детской спортивной площадки, пляжной территории, парковой территории, это все мелочи.
  - start: '00:16:40'
    speaker: yulia
    text: |
      Но для нас не мелочь. Мы покупали ради этого.
  - start: '00:16:41'
    speaker: ykizilov
    text: |
      Я понимаю. Я показал слайд. Почему для меня это мелочь? Поскольку с точки зрения необходимости инвестиций, да, это мало. Потому что львиную долю денег мы уже вложили, и это всё уже работает. Соответственно, по поводу детской спортивной площадки. Опять же, продолжая тему того, что мы не совсем злодеи.
  - start: '00:17:01'
    speaker: aleksey
    text: |
      Да не считаем мы вас злодеем. Много акцентов на этом делается.
  - start: '00:17:03'
    speaker: ykizilov
    text: |
      Я просто вижу, какой контекст и что я получаю в личные сообщения, поэтому делаю такой вывод. Мы действительно по чуть-чуть всё это делаем. Вот мы начали делать... Это схема, опять же, сейчас я... Ну, вы посмотрите там, где ручка. Это будущая дамба. Вот в этом месте мы начали уже, начали. Не закончили, а просто пока только начали делать детские площадки. У нас вся эта территория под все это отведена. Вот этот сектор у нас ведет к размещению спортивных объектов. Здесь, соответственно, здание въездной группы.

      Нам тяжело. Но я не прошу у вас денег, чтобы давайте мы скинемся, соответственно, сделаем асфальт. Либо давайте мы скинемся, сделаем горки. Я денег от вас не прошу. Я прошу только одного: не мешать мне. Я прошу только одного: не мешать. Я все сделаю сам.
  - start: '00:18:04'
