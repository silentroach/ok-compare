name: Lighthouse

on:
  schedule:
    - cron: '17 4 * * 2'
  workflow_dispatch:
    inputs:
      target:
        description: Lighthouse target
        required: true
        default: production
        type: choice
        options:
          - production
          - static

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LIGHTHOUSE_SITE_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'static' }}
      LIGHTHOUSE_DISABLE_ANALYTICS: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'production' && 'false' || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        if: ${{ env.LIGHTHOUSE_SITE_TARGET == 'static' }}
        env:
          PUBLIC_YANDEX_MAPS_API_KEY: ${{ secrets.YANDEX_MAPS_API_KEY }}
        run: pnpm build

      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun

      - name: Publish Lighthouse summary
        if: ${{ always() }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const reportsDir = '.lighthouseci';
          const categories = [
            ['performance', 'Performance'],
            ['accessibility', 'Accessibility'],
            ['best-practices', 'Best Practices'],
            ['seo', 'SEO'],
          ];

          const appendSummary = (content) => {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${content}\n`);
          };

          const escapeCell = (value) => String(value).replace(/\\/g, '\\\\').replace(/\|/g, '\\|');
          const formatScore = (score) => (typeof score === 'number' ? Math.round(score * 100) : 'n/a');
          const metrikaPattern = /https:\/\/mc\.yandex\.(?:ru|com)\//i;
          const displayUrl = (value) => {
            try {
              const url = new URL(value);
              return `${url.pathname}${url.search}` || value;
            } catch {
              return value;
            }
          };

          const auditMentionsMetrika = (audit) => audit && metrikaPattern.test(JSON.stringify({
            description: audit.description,
            details: audit.details,
            displayValue: audit.displayValue,
            title: audit.title,
          }));

          const metrikaAuditsFor = (report) => [
            ['third-party-cookies', 'third-party cookies'],
            ['inspector-issues', 'inspector issues'],
          ].filter(([id]) => auditMentionsMetrika(report.audits?.[id]));

          const listJsonFiles = (dir) => {
            if (!fs.existsSync(dir)) return [];

            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const entryPath = path.join(dir, entry.name);
              if (entry.isDirectory()) return listJsonFiles(entryPath);
              return entry.isFile() && entry.name.endsWith('.json') ? [entryPath] : [];
            });
          };

          const manifestPath = path.join(reportsDir, 'manifest.json');
          const representativePaths = fs.existsSync(manifestPath)
            ? new Set(
                JSON.parse(fs.readFileSync(manifestPath, 'utf8'))
                  .filter((entry) => entry.isRepresentativeRun && entry.jsonPath)
                  .map((entry) => path.resolve(reportsDir, entry.jsonPath)),
              )
            : new Set();

          const reports = listJsonFiles(reportsDir)
            .filter((file) => path.basename(file) !== 'manifest.json')
            .map((file) => ({ file, report: JSON.parse(fs.readFileSync(file, 'utf8')) }))
            .filter(({ report }) => report.categories && (report.finalUrl || report.requestedUrl));

          const selectedReports = representativePaths.size > 0
            ? reports.filter(({ file }) => representativePaths.has(path.resolve(file)))
            : reports;

          appendSummary('## Lighthouse CI');
          appendSummary('');
          appendSummary(`Target: \`${process.env.LIGHTHOUSE_SITE_TARGET}\``);
          appendSummary(`Analytics: \`${process.env.LIGHTHOUSE_DISABLE_ANALYTICS === 'true' ? 'disabled' : 'enabled'}\``);
          appendSummary('');

          if (selectedReports.length === 0) {
            appendSummary('No Lighthouse JSON reports were found. Check the workflow logs and the `lighthouse-reports` artifact.');
            process.exit(0);
          }

          appendSummary('| URL | Performance | Accessibility | Best Practices | SEO |');
          appendSummary('| --- | ---: | ---: | ---: | ---: |');

          for (const { report } of selectedReports.sort((left, right) =>
            displayUrl(left.report.finalUrl || left.report.requestedUrl).localeCompare(
              displayUrl(right.report.finalUrl || right.report.requestedUrl),
            ),
          )) {
            const url = displayUrl(report.finalUrl || report.requestedUrl);
            const scores = categories.map(([key]) => formatScore(report.categories[key]?.score));
            appendSummary(`| ${escapeCell(url)} | ${scores.join(' | ')} |`);
          }

          appendSummary('');

          const metrikaFindings = selectedReports
            .map(({ report }) => ({
              url: displayUrl(report.finalUrl || report.requestedUrl),
              audits: metrikaAuditsFor(report),
            }))
            .filter(({ audits }) => audits.length > 0);

          if (metrikaFindings.length > 0) {
            appendSummary('### Yandex Metrika Best Practices Finding');
            appendSummary('');
            appendSummary('Production Lighthouse runs intentionally keep Yandex Metrika enabled. The recurring third-party-cookie Best Practices finding is an accepted external-service limitation; scheduled static runs disable analytics with `LIGHTHOUSE_DISABLE_ANALYTICS=true`.');
            appendSummary('');

            for (const finding of metrikaFindings) {
              appendSummary(`- ${finding.url}: ${finding.audits.map(([, label]) => `\`${label}\``).join(', ')}`);
            }

            appendSummary('');
          }

          appendSummary('Scores are shown as percentages from representative Lighthouse runs. Full reports are attached as the `lighthouse-reports` artifact.');
          NODE

      - name: Upload Lighthouse reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lighthouse-reports
          path: .lighthouseci
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
