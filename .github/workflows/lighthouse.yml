name: Lighthouse

on:
  schedule:
    - cron: '17 4 * * 2'
  workflow_dispatch:
    inputs:
      target:
        description: Lighthouse target
        required: true
        default: production
        type: choice
        options:
          - production
          - static

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LIGHTHOUSE_SITE_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'static' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Restore Turbo cache
        if: ${{ env.LIGHTHOUSE_SITE_TARGET == 'static' }}
        id: restore-turbo-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-lighthouse-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-lighthouse-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-build-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-build-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        if: ${{ env.LIGHTHOUSE_SITE_TARGET == 'static' }}
        env:
          PUBLIC_YANDEX_MAPS_API_KEY: ${{ secrets.YANDEX_MAPS_API_KEY }}
        run: pnpm build

      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun

      - name: Save Turbo cache
        if: ${{ env.LIGHTHOUSE_SITE_TARGET == 'static' && steps.restore-turbo-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: ${{ steps.restore-turbo-cache.outputs.cache-primary-key }}

      - name: Upload Lighthouse reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lighthouse-reports
          path: .lighthouseci
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
