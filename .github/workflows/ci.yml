name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Restore Turbo cache
        id: restore-turbo-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-test-v2-${{ github.head_ref || github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-test-v2-${{ github.head_ref || github.ref_name }}-
            ${{ runner.os }}-turbo-test-v2-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run affected typecheck
        if: ${{ github.event_name == 'pull_request' }}
        run: pnpm exec turbo run typecheck --affected

      - name: Run typecheck
        if: ${{ github.event_name != 'pull_request' }}
        run: pnpm typecheck

      - name: Run affected tests
        if: ${{ github.event_name == 'pull_request' }}
        run: pnpm exec turbo run test --affected

      - name: Run tests
        if: ${{ github.event_name != 'pull_request' }}
        run: pnpm test

      - name: Save Turbo cache
        if: ${{ steps.restore-turbo-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo/cache
          key: ${{ steps.restore-turbo-cache.outputs.cache-primary-key }}

  build:
    needs: test
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          PUBLIC_YANDEX_MAPS_API_KEY: ${{ secrets.YANDEX_MAPS_API_KEY }}
        run: pnpm build

      - name: Upload VPS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vps-dist
          path: dist
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: 'https://kpshelkovo.online'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'deploy' }}
      DEPLOY_WWW_PATH: ${{ secrets.DEPLOY_WWW_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download VPS artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vps-dist
          path: dist

      - name: Validate deploy settings
        run: |
          host="$(printf '%s' "$DEPLOY_HOST" | tr -d '\r\n' | xargs)"
          user="$(printf '%s' "$DEPLOY_USER" | tr -d '\r\n' | xargs)"
          www_path="$(printf '%s' "$DEPLOY_WWW_PATH" | tr -d '\r\n')"
          port="$(printf '%s' "$DEPLOY_PORT" | tr -d '\r\n' | xargs)"

          host="${host#http://}"
          host="${host#https://}"
          host="${host%/}"

          test -n "$host"
          test -n "$user"
          test -n "$www_path"

          case "$host" in
            *[[:space:]]*|*/*|*@*)
              echo "Invalid DEPLOY_HOST: $host"
              exit 1
              ;;
          esac

          case "$user" in
            *[[:space:]]*|*@*|*/*)
              echo "Invalid DEPLOY_USER: $user"
              exit 1
              ;;
          esac

          case "$port" in
            ''|*[!0-9]*)
              echo "Invalid DEPLOY_PORT: $port"
              exit 1
              ;;
          esac

          if [ "${www_path#/}" = "$www_path" ]; then
            echo "DEPLOY_WWW_PATH must be absolute: $www_path"
            exit 1
          fi

          {
            echo "DEPLOY_HOST=$host"
            echo "DEPLOY_USER=$user"
            echo "DEPLOY_WWW_PATH=$www_path"
            echo "DEPLOY_PORT=$port"
          } >> "$GITHUB_ENV"

      - name: Setup SSH key
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Setup known_hosts
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -T 10 -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Sync build to server
        run: |
          ssh_opts="ssh -p $DEPLOY_PORT -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=$HOME/.ssh/cm-%C"

          # --no-t: не обновлять mtime у файлов, контент которых не изменился
          # (-c сравнивает по checksum, без -t mtime на сервере остается прежним
          # для уже существующих файлов; новые файлы получат mtime деплоя)
          rsync_opts="-azc --no-t --delete --mkpath --chmod=D755,F644"

          rsync $rsync_opts \
            -e "$ssh_opts" \
            dist/www/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_WWW_PATH/"

      - name: Deploy nginx config
        run: |
          ssh_opts="-p $DEPLOY_PORT -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=$HOME/.ssh/cm-%C"
          scp_opts="-P $DEPLOY_PORT -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=$HOME/.ssh/cm-%C"

          scp $scp_opts ops/nginx/deploy-nginx-site.sh "$DEPLOY_USER@$DEPLOY_HOST:/tmp/deploy-nginx-site.sh"
          scp $scp_opts ops/nginx/kpshelkovo-online.conf "$DEPLOY_USER@$DEPLOY_HOST:/tmp/kpshelkovo-online.conf.new"
          scp $scp_opts ops/nginx/sravni-shelkovo.conf "$DEPLOY_USER@$DEPLOY_HOST:/tmp/sravni-shelkovo.conf.new"

          ssh $ssh_opts "$DEPLOY_USER@$DEPLOY_HOST" '
            set -eu

            trap "rm -f /tmp/deploy-nginx-site.sh /tmp/kpshelkovo-online.conf.new /tmp/sravni-shelkovo.conf.new" EXIT

            sudo -n install -m 755 /tmp/deploy-nginx-site.sh /usr/local/sbin/deploy-nginx-site
            sudo -n /usr/local/sbin/deploy-nginx-site /tmp/kpshelkovo-online.conf.new kpshelkovo-online
            sudo -n /usr/local/sbin/deploy-nginx-site /tmp/sravni-shelkovo.conf.new sravni-shelkovo
          '

      - name: Publish deployed URLs
        run: |
          {
            echo '## Production URLs'
            echo
            echo '- https://kpshelkovo.online'
            echo '- https://сравни.шелково.рф'
          } >> "$GITHUB_STEP_SUMMARY"
