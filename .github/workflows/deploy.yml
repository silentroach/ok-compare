name: Deploy

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.20.0

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'turbo.json', 'apps/*/package.json', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          PUBLIC_YANDEX_MAPS_API_KEY: ${{ secrets.YANDEX_MAPS_API_KEY }}
        run: pnpm build

      - name: Upload VPS artifact
        uses: actions/upload-artifact@v7
        with:
          name: vps-dist
          path: dist
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: 'https://kpshelkovo.online'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'deploy' }}
      DEPLOY_WWW_PATH: ${{ secrets.DEPLOY_WWW_PATH }}
      DEPLOY_COMPARE_PATH: ${{ secrets.DEPLOY_COMPARE_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download VPS artifact
        uses: actions/download-artifact@v8
        with:
          name: vps-dist
          path: dist

      - name: Validate deploy settings
        run: |
          host="$(printf '%s' "$DEPLOY_HOST" | tr -d '\r\n' | xargs)"
          user="$(printf '%s' "$DEPLOY_USER" | tr -d '\r\n' | xargs)"
          www_path="$(printf '%s' "$DEPLOY_WWW_PATH" | tr -d '\r\n')"
          compare_path="$(printf '%s' "$DEPLOY_COMPARE_PATH" | tr -d '\r\n')"
          port="$(printf '%s' "$DEPLOY_PORT" | tr -d '\r\n' | xargs)"

          host="${host#http://}"
          host="${host#https://}"
          host="${host%/}"

          test -n "$host"
          test -n "$user"
          test -n "$www_path"
          test -n "$compare_path"

          case "$host" in
            *[[:space:]]*|*/*|*@*)
              echo "Invalid DEPLOY_HOST: $host"
              exit 1
              ;;
          esac

          case "$user" in
            *[[:space:]]*|*@*|*/*)
              echo "Invalid DEPLOY_USER: $user"
              exit 1
              ;;
          esac

          case "$port" in
            ''|*[!0-9]*)
              echo "Invalid DEPLOY_PORT: $port"
              exit 1
              ;;
          esac

          if [ "${www_path#/}" = "$www_path" ]; then
            echo "DEPLOY_WWW_PATH must be absolute: $www_path"
            exit 1
          fi

          if [ "${compare_path#/}" = "$compare_path" ]; then
            echo "DEPLOY_COMPARE_PATH must be absolute: $compare_path"
            exit 1
          fi

          {
            echo "DEPLOY_HOST=$host"
            echo "DEPLOY_USER=$user"
            echo "DEPLOY_WWW_PATH=$www_path"
            echo "DEPLOY_COMPARE_PATH=$compare_path"
            echo "DEPLOY_PORT=$port"
          } >> "$GITHUB_ENV"

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Setup known_hosts
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -T 10 -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Sync build to server
        run: |
          ssh_opts="ssh -p $DEPLOY_PORT -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=$HOME/.ssh/cm-%C"

          rsync -az --delete --mkpath --chmod=D755,F644 \
            --exclude '/static/' \
            -e "$ssh_opts" \
            dist/www/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_WWW_PATH/"

          rsync -az --mkpath --chmod=D755,F644 \
            -e "$ssh_opts" \
            dist/www/static/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_WWW_PATH/static/"

          rsync -az --delete --mkpath --chmod=D755,F644 \
            --exclude '/static/' \
            -e "$ssh_opts" \
            dist/legacy/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_COMPARE_PATH/"

          rsync -az --mkpath --chmod=D755,F644 \
            -e "$ssh_opts" \
            dist/legacy/static/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_COMPARE_PATH/static/"

      - name: Prune stale hashed assets
        run: |
          ssh_opts="-p $DEPLOY_PORT -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=$HOME/.ssh/cm-%C"

          ssh $ssh_opts "$DEPLOY_USER@$DEPLOY_HOST" '
            set -eu

            for dir in "'$DEPLOY_WWW_PATH'/static" "'$DEPLOY_COMPARE_PATH'/static"; do
              if [ -d "$dir" ]; then
                find "$dir" -type f -mtime +30 -delete
                find "$dir" -type d -empty -delete
              fi
            done
          '

      - name: Deploy nginx config
        run: |
          ssh_opts="-p $DEPLOY_PORT -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=$HOME/.ssh/cm-%C"
          scp_opts="-P $DEPLOY_PORT -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=$HOME/.ssh/cm-%C"

          scp $scp_opts ops/nginx/deploy-nginx-site.sh "$DEPLOY_USER@$DEPLOY_HOST:/tmp/deploy-nginx-site.sh"
          scp $scp_opts ops/nginx/kpshelkovo-online.conf "$DEPLOY_USER@$DEPLOY_HOST:/tmp/kpshelkovo-online.conf.new"
          scp $scp_opts ops/nginx/sravni-shelkovo.conf "$DEPLOY_USER@$DEPLOY_HOST:/tmp/sravni-shelkovo.conf.new"

          ssh $ssh_opts "$DEPLOY_USER@$DEPLOY_HOST" '
            set -eu

            trap "rm -f /tmp/deploy-nginx-site.sh /tmp/kpshelkovo-online.conf.new /tmp/sravni-shelkovo.conf.new" EXIT

            sudo -n install -m 755 /tmp/deploy-nginx-site.sh /usr/local/sbin/deploy-nginx-site
            sudo -n /usr/local/sbin/deploy-nginx-site /tmp/kpshelkovo-online.conf.new kpshelkovo-online
            sudo -n /usr/local/sbin/deploy-nginx-site /tmp/sravni-shelkovo.conf.new sravni-shelkovo
          '

      - name: Publish deployed URLs
        run: |
          {
            echo '## Production URLs'
            echo
            echo '- https://kpshelkovo.online'
            echo '- https://сравни.шелково.рф'
          } >> "$GITHUB_STEP_SUMMARY"
