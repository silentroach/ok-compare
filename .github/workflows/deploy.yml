name: Deploy

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-pages:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.20.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          PUBLIC_YANDEX_MAPS_API_KEY: ${{ secrets.YANDEX_MAPS_API_KEY }}
          ASTRO_BASE: /ok-compare
        run: pnpm build:pages

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  build-vps:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.20.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          PUBLIC_YANDEX_MAPS_API_KEY: ${{ secrets.YANDEX_MAPS_API_KEY }}
          ASTRO_BASE: /
        run: pnpm build:vps

      - name: Upload VPS artifact
        uses: actions/upload-artifact@v7
        with:
          name: vps-dist
          path: dist
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  deploy-vps:
    needs: build-vps
    runs-on: ubuntu-latest
    environment:
      name: production
      url: 'https://сравни.шелково.рф'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'deploy' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download VPS artifact
        uses: actions/download-artifact@v8
        with:
          name: vps-dist
          path: dist

      - name: Validate deploy settings
        run: |
          host="$(printf '%s' "$DEPLOY_HOST" | tr -d '\r\n' | xargs)"
          user="$(printf '%s' "$DEPLOY_USER" | tr -d '\r\n' | xargs)"
          path="$(printf '%s' "$DEPLOY_PATH" | tr -d '\r\n')"
          port="$(printf '%s' "$DEPLOY_PORT" | tr -d '\r\n' | xargs)"

          host="${host#http://}"
          host="${host#https://}"
          host="${host%/}"

          test -n "$host"
          test -n "$user"
          test -n "$path"

          case "$host" in
            *[[:space:]]*|*/*|*@*)
              echo "Invalid DEPLOY_HOST: $host"
              exit 1
              ;;
          esac

          case "$user" in
            *[[:space:]]*|*@*|*/*)
              echo "Invalid DEPLOY_USER: $user"
              exit 1
              ;;
          esac

          case "$port" in
            ''|*[!0-9]*)
              echo "Invalid DEPLOY_PORT: $port"
              exit 1
              ;;
          esac

          if [ "${path#/}" = "$path" ]; then
            echo "DEPLOY_PATH must be absolute: $path"
            exit 1
          fi

          {
            echo "DEPLOY_HOST=$host"
            echo "DEPLOY_USER=$user"
            echo "DEPLOY_PATH=$path"
            echo "DEPLOY_PORT=$port"
          } >> "$GITHUB_ENV"

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Setup known_hosts
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -T 10 -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Sync build to server
        run: |
          ssh_opts="ssh -p $DEPLOY_PORT -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=$HOME/.ssh/cm-%C"

          rsync -az --delete --mkpath --chmod=D755,F644 \
            --exclude '/_astro/' \
            -e "$ssh_opts" \
            dist/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

          rsync -az --mkpath --chmod=D755,F644 \
            -e "$ssh_opts" \
            dist/_astro/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/_astro/"

      - name: Prune stale hashed assets
        run: |
          ssh_opts="-p $DEPLOY_PORT -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=$HOME/.ssh/cm-%C"

          ssh $ssh_opts "$DEPLOY_USER@$DEPLOY_HOST" '
            set -eu

            if [ -d "'$DEPLOY_PATH'/_astro" ]; then
              find "'$DEPLOY_PATH'/_astro" -type f -mtime +30 -delete
              find "'$DEPLOY_PATH'/_astro" -type d -empty -delete
            fi
          '

      - name: Deploy nginx config
        run: |
          ssh_opts="-p $DEPLOY_PORT -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=$HOME/.ssh/cm-%C"

          ssh $ssh_opts "$DEPLOY_USER@$DEPLOY_HOST" '
            set -eu

            tmp="/tmp/sravni-shelkovo.conf.new"
            dst="/etc/nginx/sites-enabled/sravni-shelkovo"
            bak="/tmp/sravni-shelkovo.conf.bak"

            cat > "$tmp"

            cp "$dst" "$bak"
            sudo -n install -m 644 "$tmp" "$dst"

            if ! sudo -n nginx -t; then
              sudo -n install -m 644 "$bak" "$dst"
              sudo -n nginx -t
              exit 1
            fi

            sudo -n systemctl reload nginx
            sudo -n systemctl is-active --quiet nginx

            rm -f "$tmp" "$bak"
          ' < ops/nginx/sravni-shelkovo.conf
